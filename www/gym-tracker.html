<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>IRON LOG — Gym Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #ff4747;
    --text: #f0f0f0;
    --muted: #666;
    --muted2: #444;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 3px;
    color: var(--accent);
  }

  .header-actions { display: flex; gap: 8px; }

  /* MAIN LAYOUT */
  .app {
    max-width: 880px;
    margin: 0 auto;
    padding: 20px;
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 20px;
    min-height: calc(100vh - 56px);
  }

  /* SIDEBAR */
  .sidebar {}

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .exercise-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 16px;
  }

  .exercise-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .exercise-item:hover { border-color: var(--muted2); background: var(--surface2); }
  .exercise-item.active { border-color: var(--accent); background: #1a1e00; }

  .exercise-name {
    font-weight: 500;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 160px;
  }

  .exercise-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .exercise-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
  .exercise-item:hover .exercise-actions { opacity: 1; }

  /* DETAIL PANEL */
  .detail { display: flex; flex-direction: column; gap: 20px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 300px;
    color: var(--muted);
    gap: 12px;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
  }

  .empty-state .icon { font-size: 40px; opacity: 0.4; }
  .empty-state p { font-family: 'DM Mono', monospace; font-size: 12px; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
    color: var(--accent);
  }

  /* EXERCISE HEADER */
  .exercise-header-card {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .exercise-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 8px;
  }

  .info-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }

  .info-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
  }

  .info-block label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .info-block p { font-size: 12px; }

  /* LOG SET FORM */
  .log-form {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .field label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  input[type="number"], input[type="text"], select, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 60px; font-size: 12px; }

  input[type="number"] { width: 90px; }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    border-radius: var(--radius);
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent);
    color: #0a0a0a;
    font-weight: 500;
  }
  .btn-primary:hover { background: #d4e83e; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--muted2); background: #222; }

  .btn-danger {
    background: transparent;
    color: var(--accent2);
    border: 1px solid #3a1414;
  }
  .btn-danger:hover { background: #2a0a0a; border-color: var(--accent2); }

  .btn-icon {
    padding: 4px 6px;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    border-radius: 3px;
    transition: color 0.15s, background 0.15s;
    font-size: 13px;
  }
  .btn-icon:hover { color: var(--text); background: var(--surface2); }
  .btn-icon.danger:hover { color: var(--accent2); }

  /* TIMER */
  .timer-banner {
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: #1a1e00;
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 12px 16px;
  }

  .timer-banner.active { display: flex; }

  .timer-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }

  .timer-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .timer-progress {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .timer-bar {
    height: 100%; background: var(--accent);
    width: 100%;
    transition: width 1s linear;
    border-radius: 2px;
  }

  /* CHART */
  .chart-container { position: relative; }

  canvas { width: 100% !important; }

  /* SETS TABLE */
  .sets-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }

  .sets-table th {
    text-align: left;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
  }

  .sets-table td {
    padding: 8px 8px;
    border-bottom: 1px solid #1a1a1a;
    vertical-align: middle;
  }

  .sets-table tr:last-child td { border-bottom: none; }
  .sets-table tr:hover td { background: var(--surface2); }

  .set-badge {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 6px;
    font-size: 10px;
    color: var(--muted);
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.8);
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    width: 100%;
    max-width: 420px;
    margin: 20px;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .modal-fields { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .modal-field { display: flex; flex-direction: column; gap: 5px; }
  .modal-field label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--accent);
    color: #0a0a0a;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 16px;
    border-radius: var(--radius);
    z-index: 999;
    transform: translateY(60px);
    opacity: 0;
    transition: all 0.3s ease;
    font-weight: 500;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* IMPORT/EXPORT BUTTONS */
  .io-bar {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { order: 2; }
    .detail { order: 1; }
    .exercise-header-card { flex-direction: column; }
  }

  /* NO SETS */
  .no-sets {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    padding: 20px 8px;
    text-align: center;
  }

  /* LAST WEIGHT BADGE */
  .last-weight {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #1a1e00;
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 4px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    margin-top: 8px;
  }

  .pr-badge {
    background: var(--accent2);
    color: white;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 1px 5px;
    border-radius: 3px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">IRON LOG</div>
  <div class="header-actions io-bar">
    <button class="btn btn-secondary" onclick="exportData()">⬇ Export</button>
    <label class="btn btn-secondary" style="cursor:pointer">
      ⬆ Import
      <input type="file" accept=".json" style="display:none" onchange="importData(event)">
    </label>
  </div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="section-label">Exercises</div>
    <ul class="exercise-list" id="exerciseList"></ul>
    <button class="btn btn-primary" style="width:100%" onclick="openExerciseModal()">+ New Exercise</button>
  </aside>

  <!-- DETAIL -->
  <main class="detail" id="detail">
    <div class="empty-state">
      <div class="icon">🏋️</div>
      <p>Select or create an exercise</p>
    </div>
  </main>
</div>

<!-- EXERCISE MODAL -->
<div class="modal-overlay" id="exerciseModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">New Exercise</div>
    <div class="modal-fields">
      <div class="modal-field">
        <label>Exercise Name</label>
        <input type="text" id="exName" placeholder="e.g. Bench Press">
      </div>
      <div class="modal-field">
        <label>Setting Info</label>
        <input type="text" id="exSetting" placeholder="e.g. Incline 30°, Grip width: shoulder">
      </div>
      <div class="modal-field">
        <label>Notes</label>
        <textarea id="exNotes" placeholder="Technique cues, reminders..."></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeExerciseModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveExercise()">Save</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── DATA MODEL ───────────────────────────────────────────────────
let db = loadDB();
let selectedId = null;
let timerInterval = null;
let timerStart = null;
let timerDuration = 120; // 2 minutes
let editingId = null;

function loadDB() {
  const raw = localStorage.getItem('ironlog_v1');
  if (raw) return JSON.parse(raw);
  return { exercises: [] };
}

function saveDB() {
  localStorage.setItem('ironlog_v1', JSON.stringify(db));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// ─── EXERCISE CRUD ────────────────────────────────────────────────
function openExerciseModal(id = null) {
  editingId = id;
  if (id) {
    const ex = db.exercises.find(e => e.id === id);
    document.getElementById('modalTitle').textContent = 'Edit Exercise';
    document.getElementById('exName').value = ex.name;
    document.getElementById('exSetting').value = ex.settingInfo || '';
    document.getElementById('exNotes').value = ex.notes || '';
  } else {
    document.getElementById('modalTitle').textContent = 'New Exercise';
    document.getElementById('exName').value = '';
    document.getElementById('exSetting').value = '';
    document.getElementById('exNotes').value = '';
  }
  document.getElementById('exerciseModal').classList.add('open');
  setTimeout(() => document.getElementById('exName').focus(), 100);
}

function closeExerciseModal() {
  document.getElementById('exerciseModal').classList.remove('open');
  editingId = null;
}

function saveExercise() {
  const name = document.getElementById('exName').value.trim();
  if (!name) return;
  const settingInfo = document.getElementById('exSetting').value.trim();
  const notes = document.getElementById('exNotes').value.trim();

  if (editingId) {
    const ex = db.exercises.find(e => e.id === editingId);
    ex.name = name; ex.settingInfo = settingInfo; ex.notes = notes;
    toast('Exercise updated');
  } else {
    const ex = { id: genId(), name, settingInfo, notes, sets: [] };
    db.exercises.push(ex);
    selectedId = ex.id;
    toast('Exercise created');
  }
  saveDB();
  closeExerciseModal();
  renderSidebar();
  renderDetail();
}

function deleteExercise(id) {
  if (!confirm('Delete this exercise and all its data?')) return;
  db.exercises = db.exercises.filter(e => e.id !== id);
  if (selectedId === id) selectedId = null;
  saveDB();
  renderSidebar();
  renderDetail();
  toast('Exercise deleted');
}

// ─── SET LOGGING ──────────────────────────────────────────────────
function logSet() {
  const ex = db.exercises.find(e => e.id === selectedId);
  if (!ex) return;

  const weightVal = parseFloat(document.getElementById('logWeight').value);
  const unit = document.getElementById('logUnit').value;
  const reps = parseInt(document.getElementById('logReps').value);

  if (isNaN(weightVal) || weightVal <= 0 || isNaN(reps) || reps <= 0) {
    toast('Enter valid weight and reps');
    return;
  }

  const set = {
    id: genId(),
    reps,
    datetime: new Date().toISOString(),
    weight: { value: weightVal, unit }
  };

  ex.sets.push(set);
  saveDB();
  renderDetail();
  toast('Set logged! 💪');
  offerTimer();
}

function deleteSet(setId) {
  const ex = db.exercises.find(e => e.id === selectedId);
  if (!ex) return;
  ex.sets = ex.sets.filter(s => s.id !== setId);
  saveDB();
  renderDetail();
}

// ─── TIMER ────────────────────────────────────────────────────────
function offerTimer() {
  // Auto-start the timer
  startTimer();
}

function startTimer() {
  if (timerInterval) { clearInterval(timerInterval); }
  timerStart = Date.now();
  timerDuration = 120;

  const banner = document.getElementById('timerBanner');
  if (!banner) return;
  banner.classList.add('active');
  updateTimerDisplay();

  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - timerStart) / 1000);
    const remaining = timerDuration - elapsed;
    if (remaining <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      banner.classList.remove('active');
      toast('Rest complete! Time to lift 🔥');
    } else {
      updateTimerDisplay();
    }
  }, 500);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  const banner = document.getElementById('timerBanner');
  if (banner) banner.classList.remove('active');
}

function updateTimerDisplay() {
  const el = document.getElementById('timerDisplay');
  const bar = document.getElementById('timerBar');
  if (!el) return;
  const elapsed = Math.floor((Date.now() - timerStart) / 1000);
  const remaining = Math.max(0, timerDuration - elapsed);
  const m = Math.floor(remaining / 60).toString().padStart(2, '0');
  const s = (remaining % 60).toString().padStart(2, '0');
  el.textContent = `${m}:${s}`;
  const pct = (remaining / timerDuration) * 100;
  if (bar) bar.style.width = pct + '%';
}

// ─── CHART ────────────────────────────────────────────────────────
function renderChart(ex) {
  const canvas = document.getElementById('weightChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  // Get last 20 sets
  const sets = ex.sets.slice(-20);

  if (sets.length === 0) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#444';
    ctx.font = '12px DM Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('No sets logged yet', canvas.width / 2, canvas.height / 2);
    return;
  }

  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth;
  const H = 140;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  const values = sets.map(s => s.weight.value);
  const maxVal = Math.max(...values);
  const minVal = Math.min(...values) * 0.9;
  const range = maxVal - minVal || 1;

  const padL = 44, padR = 12, padT = 14, padB = 28;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const barW = Math.max(6, Math.floor(chartW / sets.length) - 4);

  ctx.clearRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  [0, 0.25, 0.5, 0.75, 1].forEach(t => {
    const y = padT + chartH * (1 - t);
    ctx.beginPath();
    ctx.moveTo(padL, y); ctx.lineTo(W - padR, y);
    ctx.stroke();
  });

  // Y axis labels
  ctx.fillStyle = '#555';
  ctx.font = '9px DM Mono, monospace';
  ctx.textAlign = 'right';
  [0, 0.5, 1].forEach(t => {
    const val = minVal + range * t;
    const y = padT + chartH * (1 - t);
    ctx.fillText(val.toFixed(1), padL - 4, y + 3);
  });

  // Bars
  const maxWeight = Math.max(...values);
  sets.forEach((s, i) => {
    const x = padL + i * (chartW / sets.length) + (chartW / sets.length - barW) / 2;
    const norm = (s.weight.value - minVal) / range;
    const bh = Math.max(2, norm * chartH);
    const y = padT + chartH - bh;

    const isPR = s.weight.value === maxWeight;
    ctx.fillStyle = isPR ? '#e8ff47' : '#3a4000';
    ctx.beginPath();
    ctx.roundRect(x, y, barW, bh, [2, 2, 0, 0]);
    ctx.fill();

    // X label (date)
    const d = new Date(s.datetime);
    const label = `${d.getMonth()+1}/${d.getDate()}`;
    ctx.fillStyle = '#444';
    ctx.font = '8px DM Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(label, x + barW / 2, H - padB + 12);
  });

  // Unit label
  const unit = sets[sets.length-1]?.weight?.unit || 'kg';
  ctx.fillStyle = '#555';
  ctx.font = '9px DM Mono, monospace';
  ctx.textAlign = 'left';
  ctx.fillText(unit, 0, padT + 3);
}

// ─── RENDER ───────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('exerciseList');
  list.innerHTML = '';

  if (db.exercises.length === 0) {
    list.innerHTML = '<li style="color:#555;font-size:12px;padding:8px;font-family:DM Mono,monospace;">No exercises yet</li>';
    return;
  }

  db.exercises.forEach(ex => {
    const li = document.createElement('li');
    li.className = 'exercise-item' + (ex.id === selectedId ? ' active' : '');
    const lastSet = ex.sets[ex.sets.length - 1];
    const meta = lastSet ? `${lastSet.weight.value}${lastSet.weight.unit} × ${lastSet.reps}` : `${ex.sets.length} sets`;
    li.innerHTML = `
      <div style="flex:1;min-width:0">
        <div class="exercise-name">${esc(ex.name)}</div>
        <div class="exercise-meta">${esc(meta)}</div>
      </div>
      <div class="exercise-actions">
        <button class="btn-icon" onclick="event.stopPropagation();openExerciseModal('${ex.id}')" title="Edit">✏️</button>
        <button class="btn-icon danger" onclick="event.stopPropagation();deleteExercise('${ex.id}')" title="Delete">🗑</button>
      </div>
    `;
    li.addEventListener('click', () => { selectedId = ex.id; renderSidebar(); renderDetail(); });
    list.appendChild(li);
  });
}

function renderDetail() {
  const detail = document.getElementById('detail');
  const ex = db.exercises.find(e => e.id === selectedId);

  if (!ex) {
    detail.innerHTML = `
      <div class="empty-state">
        <div class="icon">🏋️</div>
        <p>Select or create an exercise</p>
      </div>`;
    return;
  }

  const lastWeight = getLastWeight(ex);
  const prSet = ex.sets.reduce((best, s) => (!best || s.weight.value > best.weight.value) ? s : best, null);

  const recentSets = [...ex.sets].reverse().slice(0, 15);

  detail.innerHTML = `
    <!-- HEADER -->
    <div class="card exercise-header-card">
      <div style="flex:1">
        <div class="exercise-title">${esc(ex.name)}</div>
        ${ex.settingInfo || ex.notes ? `
        <div class="info-row">
          ${ex.settingInfo ? `<div class="info-block"><label>Setting</label><p>${esc(ex.settingInfo)}</p></div>` : ''}
          ${ex.notes ? `<div class="info-block" style="grid-column:${ex.settingInfo ? '2' : '1 / -1'}"><label>Notes</label><p>${esc(ex.notes)}</p></div>` : ''}
        </div>` : ''}
        ${lastWeight ? `<div class="last-weight">Last: ${lastWeight.value}${lastWeight.unit} ${prSet && lastWeight.value === prSet.weight.value ? '<span class="pr-badge">PR</span>' : ''}</div>` : ''}
      </div>
      <button class="btn btn-secondary" onclick="openExerciseModal('${ex.id}')">Edit</button>
    </div>

    <!-- TIMER -->
    <div class="timer-banner" id="timerBanner">
      <div>
        <div class="timer-label">Rest Timer</div>
        <div class="timer-display" id="timerDisplay">02:00</div>
      </div>
      <div class="timer-progress"><div class="timer-bar" id="timerBar"></div></div>
      <button class="btn btn-secondary" onclick="stopTimer()">Skip</button>
    </div>

    <!-- LOG SET -->
    <div class="card">
      <div class="card-title">Log Set</div>
      <div class="log-form">
        <div class="field">
          <label>Weight</label>
          <input type="number" id="logWeight" placeholder="0" min="0" step="0.5" value="${lastWeight ? lastWeight.value : ''}">
        </div>
        <div class="field">
          <label>Unit</label>
          <select id="logUnit" style="width:72px">
            <option value="kg" ${lastWeight?.unit === 'kg' ? 'selected' : ''}>kg</option>
            <option value="lbs" ${lastWeight?.unit === 'lbs' ? 'selected' : ''}>lbs</option>
          </select>
        </div>
        <div class="field">
          <label>Reps</label>
          <input type="number" id="logReps" placeholder="0" min="1" step="1" value="">
        </div>
        <button class="btn btn-primary" onclick="logSet()">Log Set</button>
      </div>
    </div>

    <!-- CHART -->
    <div class="card">
      <div class="card-title">Weight History</div>
      <div class="chart-container">
        <canvas id="weightChart"></canvas>
      </div>
    </div>

    <!-- SETS LOG -->
    <div class="card">
      <div class="card-title">Recent Sets</div>
      ${recentSets.length === 0 ? '<div class="no-sets">No sets logged yet. Get to work!</div>' : `
      <table class="sets-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Date & Time</th>
            <th>Weight</th>
            <th>Reps</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${recentSets.map((s, i) => {
            const d = new Date(s.datetime);
            const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            const timeStr = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            const isPR = prSet && s.id === prSet.id;
            return `<tr>
              <td><span class="set-badge">${ex.sets.length - i}</span></td>
              <td>${dateStr} ${timeStr}</td>
              <td style="color:${isPR ? 'var(--accent)' : 'var(--text)'}">
                ${s.weight.value} ${s.weight.unit}
                ${isPR ? '<span class="pr-badge">PR</span>' : ''}
              </td>
              <td>${s.reps} reps</td>
              <td><button class="btn-icon danger" onclick="deleteSet('${s.id}')">✕</button></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`}
    </div>
  `;

  // Re-attach timer if running
  if (timerInterval) {
    document.getElementById('timerBanner').classList.add('active');
    updateTimerDisplay();
  }

  // Render chart after DOM is ready
  requestAnimationFrame(() => renderChart(ex));
}

// ─── HELPERS ──────────────────────────────────────────────────────
function getLastWeight(ex) {
  if (!ex.sets.length) return null;
  return ex.sets[ex.sets.length - 1].weight;
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── IMPORT / EXPORT ──────────────────────────────────────────────
function exportData() {
  const json = JSON.stringify(db, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ironlog-export-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Data exported!');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.exercises || !Array.isArray(imported.exercises)) throw new Error('Invalid format');
      if (!confirm(`Import ${imported.exercises.length} exercises? This will replace your current data.`)) return;
      db = imported;
      selectedId = null;
      saveDB();
      renderSidebar();
      renderDetail();
      toast('Data imported!');
    } catch {
      toast('Invalid JSON file');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ─── KEYBOARD ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeExerciseModal();
  if ((e.key === 'Enter') && document.getElementById('exerciseModal').classList.contains('open')) {
    if (e.target.tagName !== 'TEXTAREA') saveExercise();
  }
});

document.getElementById('exerciseModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeExerciseModal();
});

// ─── INIT ─────────────────────────────────────────────────────────
renderSidebar();
renderDetail();
</script>
</body>
</html>
